name: 99 - Validate-Configs

on:
  push:
    paths:
      - "config/**"
  pull_request:
    paths:
      - "config/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate configuration
        run: node scripts/validate-configs.mjs
