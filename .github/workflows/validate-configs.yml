name: Validate-Configs

on:
  push:
    paths:
      - "config/**"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "config/**"
      - "scripts/**"
      - ".github/workflows/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate configuration
        run: node scripts/validate-configs.mjs
