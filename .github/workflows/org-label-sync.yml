name: Org-Label-Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview label changes without applying them"
        required: false
        type: boolean
        default: false
      delete_missing:
        description: "Delete extra non-default labels that are not present in config"
        required: false
        type: boolean
        default: false
      delete_github_default_labels:
        description: "Delete Github default labels"
        required: false
        type: boolean
        default: true
      repositories:
        description: "Config Override: Run workflow on this set of repositories exclusively. (Type name(s), separated by comma)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh-config:
    uses: ./.github/workflows/config-label-sync.yml
    secrets: inherit

  sync-org:
    needs: refresh-config
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Resolve PAT auth token
        id: pat_auth
        if: ${{ steps.properties.outputs.auth_mode == 'pat' }}
        env:
          AUTH_MODE: pat
          PAT_TOKEN: ${{ secrets[steps.properties.outputs.pat_token_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Resolve GitHub App auth token
        id: app_auth
        if: ${{ steps.properties.outputs.auth_mode == 'githubApp' }}
        env:
          AUTH_MODE: githubApp
          GITHUB_APP_ID: ${{ secrets[steps.properties.outputs.github_app_id_secret_name] }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets[steps.properties.outputs.github_app_private_key_secret_name] }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets[steps.properties.outputs.github_app_installation_id_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Validate updated config
        run: node scripts/sync-labels.mjs --validate-only

      - name: Sync labels across the organization
        env:
          ORG_NAME: ${{ steps.properties.outputs.organization }}
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_MISSING: ${{ inputs.delete_missing }}
          DELETE_GITHUB_DEFAULT_LABELS: ${{ inputs.delete_github_default_labels }}
          TARGET_REPOSITORIES: ${{ inputs.repositories }}
        run: node scripts/sync-labels.mjs

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            changelog_path="fake-changelogs"
            commit_message="Add Org-Label-Sync fake changelog [skip ci]"
          else
            changelog_path="changelogs"
            commit_message="Add Org-Label-Sync changelog [skip ci]"
          fi
          if [ -z "$(git status --porcelain -- "$changelog_path")" ]; then
            echo "No changelog changes detected."
            exit 0
          fi
          git add "$changelog_path"
          git commit -m "$commit_message"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
