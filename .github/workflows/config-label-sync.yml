name: Config-Label_Sync

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  sync-config:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Resolve PAT auth token
        id: pat_auth
        if: ${{ steps.properties.outputs.auth_mode == 'pat' }}
        env:
          AUTH_MODE: pat
          PAT_TOKEN: ${{ secrets[steps.properties.outputs.pat_token_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Resolve GitHub App auth token
        id: app_auth
        if: ${{ steps.properties.outputs.auth_mode == 'githubApp' }}
        env:
          AUTH_MODE: githubApp
          GITHUB_APP_ID: ${{ secrets[steps.properties.outputs.github_app_id_secret_name] }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets[steps.properties.outputs.github_app_private_key_secret_name] }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets[steps.properties.outputs.github_app_installation_id_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Sync current repo labels into config
        env:
          SOURCE_REPOSITORY: ${{ steps.properties.outputs.source_repository }}
        run: node scripts/sync-config-labels.mjs

      - name: Commit config updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- config/labels.jsonc config/deleted-labels.jsonc; then
            echo "No config changes detected."
            exit 0
          fi
          git add config/labels.jsonc config/deleted-labels.jsonc
          git commit -m "Sync labels config from source repository"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
