name: Org-Label-Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview label changes without applying them"
        required: false
        type: boolean
        default: true
      delete_missing:
        description: "Delete labels that are not present in config"
        required: false
        type: boolean
        default: false
      repositories:
        description: "Optional comma-separated subset of repositories after repository-filter rules are applied"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh-config:
    uses: ./.github/workflows/config-label-sync.yml
    secrets: inherit

  sync-org:
    needs: refresh-config
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Validate updated config
        run: node scripts/sync-labels.mjs --validate-only

      - name: Sync labels across the organization
        env:
          LABEL_SYNC_TOKEN: ${{ secrets[steps.properties.outputs.label_sync_token_secret_name] }}
          ORG_NAME: ${{ steps.properties.outputs.organization }}
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_MISSING: ${{ inputs.delete_missing }}
          TARGET_REPOSITORIES: ${{ inputs.repositories }}
        run: node scripts/sync-labels.mjs

      - name: Commit changelog
        if: ${{ !inputs.dry_run }}
        env:
          PUSH_TOKEN: ${{ secrets[steps.properties.outputs.label_sync_token_secret_name] }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- changelogs)" ]; then
            echo "No changelog changes detected."
            exit 0
          fi
          git add changelogs
          git commit -m "Add Org-Label-Sync changelog [skip ci]"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
