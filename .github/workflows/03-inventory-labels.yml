name: 03 - Inventory-Labels

on:
  workflow_dispatch:
    inputs:
      exclude_configured_labels:
        description: "Exclude labels present in config."
        required: false
        type: boolean
        default: false
      list_similarities:
        description: "List label similarities across selected repositories."
        required: false
        type: boolean
        default: false
      repositories:
        description: "[OPTIONAL] Config Override: Run workflow on this set of repositories exclusively. Format: name, name2"
        required: false
        type: string

permissions:
  contents: read

jobs:
  inventory-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Resolve PAT auth token
        id: pat_auth
        if: ${{ steps.properties.outputs.auth_mode == 'pat' }}
        env:
          AUTH_MODE: pat
          PAT_TOKEN: ${{ secrets[steps.properties.outputs.pat_token_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Resolve GitHub App auth token
        id: app_auth
        if: ${{ steps.properties.outputs.auth_mode == 'githubApp' }}
        env:
          AUTH_MODE: githubApp
          GITHUB_APP_ID: ${{ secrets[steps.properties.outputs.github_app_id_secret_name] }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets[steps.properties.outputs.github_app_private_key_secret_name] }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets[steps.properties.outputs.github_app_installation_id_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Validate config
        env:
          TARGET_REPOSITORIES: ${{ inputs.repositories }}
        run: node scripts/inventory-labels.mjs --validate-only

      - name: Inventory labels
        env:
          EXCLUDE_CONFIGURED_LABELS: ${{ inputs.exclude_configured_labels }}
          LIST_SIMILARITIES: ${{ inputs.list_similarities }}
          TARGET_REPOSITORIES: ${{ inputs.repositories }}
        run: node scripts/inventory-labels.mjs
