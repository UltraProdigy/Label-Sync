name: 04 - Distribute-Label-Workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "[TEST MODE] Preview selected repositories and workflow changes without writing."
        required: false
        type: boolean
        default: false
      repository_selection_mode:
        description: "Choose which repository list from config/label-test-workflow-config.jsonc to use."
        required: true
        type: choice
        options:
          - whitelist
          - blacklist
      delivery_mode:
        description: "Choose whether to commit directly or open/update a PR in each selected repository."
        required: true
        type: choice
        options:
          - Direct Commit
          - Pull Request

permissions:
  contents: write
  pull-requests: write

jobs:
  distribute-label-test-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Resolve PAT auth token
        id: pat_auth
        if: ${{ steps.properties.outputs.auth_mode == 'pat' }}
        env:
          AUTH_MODE: pat
          PAT_TOKEN: ${{ secrets[steps.properties.outputs.pat_token_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Resolve GitHub App auth token
        id: app_auth
        if: ${{ steps.properties.outputs.auth_mode == 'githubApp' }}
        env:
          AUTH_MODE: githubApp
          GITHUB_APP_ID: ${{ secrets[steps.properties.outputs.github_app_id_secret_name] }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets[steps.properties.outputs.github_app_private_key_secret_name] }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets[steps.properties.outputs.github_app_installation_id_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Validate Label Test workflow config
        run: node scripts/distribute-label-test-workflows.mjs --validate-only

      - name: Distribute caller workflows
        env:
          ORG_NAME: ${{ steps.properties.outputs.organization }}
          REPOSITORY_SELECTION_MODE: ${{ inputs.repository_selection_mode }}
          DELIVERY_MODE: ${{ inputs.delivery_mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          LABEL_TEST_SOURCE_REPOSITORY: ${{ github.repository }}
          LABEL_TEST_SOURCE_REF: ${{ github.event.repository.default_branch }}
        run: node scripts/distribute-label-test-workflows.mjs
