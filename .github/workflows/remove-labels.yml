name: Remove-Labels

on:
  workflow_dispatch:
    inputs:
      run_on_issues:
        description: "Remove From Issues"
        required: true
        type: boolean
        default: true
      target_only_closed_issues:
        description: "Target Only Closed Issues"
        required: true
        type: boolean
        default: false
      run_on_pull_requests:
        description: "Remove From Pull Requests"
        required: true
        type: boolean
        default: true
      target_only_closed_pull_requests:
        description: "Target Only Closed Pull Requests"
        required: true
        type: boolean
        default: false
      label_name:
        description: "Exact Name of Label:"
        required: true
        type: string

permissions:
  contents: write

jobs:
  remove-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Resolve PAT auth token
        id: pat_auth
        if: ${{ steps.properties.outputs.auth_mode == 'pat' }}
        env:
          AUTH_MODE: pat
          PAT_TOKEN: ${{ secrets[steps.properties.outputs.pat_token_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Resolve GitHub App auth token
        id: app_auth
        if: ${{ steps.properties.outputs.auth_mode == 'githubApp' }}
        env:
          AUTH_MODE: githubApp
          GITHUB_APP_ID: ${{ secrets[steps.properties.outputs.github_app_id_secret_name] }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets[steps.properties.outputs.github_app_private_key_secret_name] }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets[steps.properties.outputs.github_app_installation_id_secret_name] }}
        run: node scripts/create-github-auth-token.mjs

      - name: Validate config
        run: node scripts/remove-labels.mjs --validate-only

      - name: Remove labels from selected items
        env:
          RUN_ON_ISSUES: ${{ inputs.run_on_issues }}
          TARGET_ONLY_CLOSED_ISSUES: ${{ inputs.target_only_closed_issues }}
          RUN_ON_PULL_REQUESTS: ${{ inputs.run_on_pull_requests }}
          TARGET_ONLY_CLOSED_PULL_REQUESTS: ${{ inputs.target_only_closed_pull_requests }}
          LABEL_NAME: ${{ inputs.label_name }}
        run: node scripts/remove-labels.mjs

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- changelogs)" ]; then
            echo "No changelog changes detected."
            exit 0
          fi
          git add changelogs
          git commit -m "Add Remove-Labels changelog [skip ci]"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
