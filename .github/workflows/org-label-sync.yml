name: Org-Label-Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview label changes without applying them"
        required: false
        type: boolean
        default: true
      delete_missing:
        description: "Delete labels that are not present in config"
        required: false
        type: boolean
        default: false
      repositories:
        description: "Optional comma-separated subset of discovered repositories"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh-config:
    uses: ./.github/workflows/config-label-sync.yml
    secrets: inherit

  sync-org:
    needs: refresh-config
    runs-on: ubuntu-latest

    steps:
      - name: Check out latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate updated config
        run: node scripts/sync-labels.mjs --validate-only

      - name: Sync labels across the organization
        env:
          LABEL_SYNC_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
          ORG_NAME: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_MISSING: ${{ inputs.delete_missing }}
          TARGET_REPOSITORIES: ${{ inputs.repositories }}
        run: node scripts/sync-labels.mjs
